name: e2e-aprovacoes
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      flaky_keep:
        description: "Quantas execuções o detector de flaky analisa (10/20/30/50)"
        required: false
        default: "30"
      smoke_retries:
        description: "Tentativas extras só dos smoke tests de permissão"
        required: false
        default: "2"

# Evita execuções concorrentes para o mesmo PR (e2e usa dados compartilhados).
concurrency:
  group: e2e-aprovacoes-${{ github.ref }}
  cancel-in-progress: true

env:
  # Configurável via repo variables (Settings → Variables) ou workflow_dispatch.
  # Precedência: workflow_dispatch input > repo variable > default.
  FLAKY_KEEP: ${{ github.event.inputs.flaky_keep || vars.E2E_FLAKY_KEEP || '30' }}
  SMOKE_RETRIES: ${{ github.event.inputs.smoke_retries || vars.E2E_SMOKE_RETRIES || '2' }}

jobs:
  e2e-aprovacoes:
    name: Playwright — Aprovações (${{ matrix.role }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Pula em PRs vindos de forks (secrets indisponíveis).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    strategy:
      fail-fast: false
      # Matriz por papel: cada job loga com um usuário diferente para
      # cobrir as permissões reais (vendedor vê só os próprios; supervisor
      # vê toda a equipe). Os secrets variam por papel.
      matrix:
        include:
          - role: vendedor
            email_secret: E2E_VENDEDOR_EMAIL
            password_secret: E2E_VENDEDOR_PASSWORD
          - role: supervisor
            email_secret: E2E_SUPERVISOR_EMAIL
            password_secret: E2E_SUPERVISOR_PASSWORD

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Restaurar histórico de runs (para detector de flaky)
        uses: actions/cache@v4
        with:
          path: playwright-history/${{ matrix.role }}
          key: pw-history-${{ matrix.role }}-${{ github.run_id }}
          restore-keys: |
            pw-history-${{ matrix.role }}-

      - name: Reset (apaga apenas dados do seed E2E)
        env:
          SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run scripts/seed/e2e-aprovacoes-reset.ts

      - name: Seed determinístico (ownership do papel ${{ matrix.role }})
        env:
          SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets[matrix.email_secret] }}
          E2E_SUPERVISOR_EMAIL: ${{ secrets.E2E_SUPERVISOR_EMAIL }}
        run: bun run scripts/seed/e2e-aprovacoes.ts

      - name: Smoke tests de permissão (com retries isolados)
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_EMAIL: ${{ secrets[matrix.email_secret] }}
          E2E_TEST_PASSWORD: ${{ secrets[matrix.password_secret] }}
          E2E_ROLE: ${{ matrix.role }}
          CI: "true"
        run: |
          # Retry só para o conjunto @smoke. Cada retry é uma execução
          # completa apenas dos smoke tests (segundos, não minutos), então
          # não impacta o tempo da suíte completa nem reexecuta os specs
          # principais. Isso reduz falsos negativos por timing/cold start
          # do preview sem mascarar regressões reais (basta inspecionar a
          # saída para ver quantas tentativas foram necessárias).
          attempts=$(( ${SMOKE_RETRIES:-2} + 1 ))
          rc=1
          for i in $(seq 1 "$attempts"); do
            echo "::group::Smoke tentativa $i de $attempts"
            if bunx playwright test --config=playwright.config.ts \
                 --grep @smoke --reporter=list; then
              rc=0
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [ "$i" -lt "$attempts" ]; then
              echo "Smoke falhou na tentativa $i — aguardando 5s e retentando…"
              sleep 5
            fi
          done
          if [ "$rc" -ne 0 ]; then
            echo "::error::Smoke tests de permissão falharam após $attempts tentativas (papel=${E2E_ROLE})."
            exit "$rc"
          fi

      - name: Run Playwright e2e (Aprovações) — ${{ matrix.role }}
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_EMAIL: ${{ secrets[matrix.email_secret] }}
          E2E_TEST_PASSWORD: ${{ secrets[matrix.password_secret] }}
          E2E_ROLE: ${{ matrix.role }}
          CI: "true"
        run: bunx playwright test --config=playwright.config.ts --grep-invert @smoke

      - name: Detectar testes flaky (histórico — keep=${{ env.FLAKY_KEEP }})
        if: always()
        run: |
          bun run scripts/ci/detect-flaky-tests.ts \
            --results playwright-report/results.json \
            --history playwright-history/${{ matrix.role }} \
            --role "${{ matrix.role }}" \
            --run-id "${{ github.run_id }}" \
            --out playwright-report/FLAKY.md \
            --keep "${FLAKY_KEEP}" || true

      - name: Gerar relatório consolidado
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_NAME: playwright-test-results-${{ matrix.role }}-${{ github.run_id }}
        run: |
          bun run scripts/ci/consolidate-playwright-report.ts \
            --results playwright-report/results.json \
            --out playwright-report/CONSOLIDATED.md \
            --role "${{ matrix.role }}" \
            --run-url "$RUN_URL" \
            --artifact-name "$ARTIFACT_NAME" || true

      - name: Anexar relatório consolidado ao Step Summary
        if: always()
        run: |
          if [ -f playwright-report/CONSOLIDATED.md ]; then
            cat playwright-report/CONSOLIDATED.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Relatório consolidado ausente." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f playwright-report/FLAKY.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat playwright-report/FLAKY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.role }}-${{ github.run_id }}
          path: playwright-report
          retention-days: 14

      - name: Upload screenshots, videos e traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.role }}-${{ github.run_id }}
          path: test-results
          retention-days: 14

      - name: Comentar resumo no PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'playwright-report/CONSOLIDATED.md';
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            const marker = `<!-- e2e-aprovacoes:${{ matrix.role }} -->`;
            const finalBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.data.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: finalBody,
              });
            }
