name: dependency-review

# Bloqueia PRs que introduzam dependências com CVEs ou licenças incompatíveis.
# Roda apenas em PRs (a action depende do diff base..head do GitHub).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # Falha em high/critical. Moderate vira aviso (não bloqueia).
          fail-on-severity: high
          # Licenças vetadas — adicione conforme política jurídica.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-only, GPL-3.0-only
          comment-summary-in-pr: on-failure
