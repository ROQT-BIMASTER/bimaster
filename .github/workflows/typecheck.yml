name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: TypeScript typecheck
        # Heap default do Node (~2GB) estoura ao tipechecar o projeto. O crash
        # acontece em ~2043MB. Subimos para 4096MB para dar folga consistente.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: bun run typecheck
