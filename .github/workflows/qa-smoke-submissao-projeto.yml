name: qa-smoke-submissao-projeto

# Smoke E2E manual da unificaГ§ГЈo SubmissГЈoв†”Projeto (Fluxos 1 e 2).
# NГѓO roda em PRs por padrГЈo вЂ” apenas via workflow_dispatch вЂ” porque cria
# e apaga dados reais em staging via edge functions `qa-smoke-seed` /
# `qa-smoke-cleanup`. Essas funГ§Гµes respondem 403 se a secret
# QA_SMOKE_ENABLED=true nГЈo estiver setada no ambiente alvo, entГЈo o
# workflow Г© inerte se rodado contra produГ§ГЈo sem preparaГ§ГЈo.
#
# Secrets necessГЎrias no repo:
#   SMOKE_USER_EMAIL          вЂ” usuГЎrio admin de QA em staging
#   SMOKE_USER_PASSWORD       вЂ” senha do usuГЎrio acima
#   SMOKE_SUPABASE_URL        вЂ” URL do Supabase de staging
#   SMOKE_SUPABASE_ANON_KEY   вЂ” publishable key de staging
#   SMOKE_BASE_URL            вЂ” URL pГєblica do app em staging
#
# PrГ©-requisito no ambiente Supabase de staging:
#   - edge functions qa-smoke-seed e qa-smoke-cleanup deployadas
#   - secret QA_SMOKE_ENABLED=true configurada nas duas
#   - usuГЎrio SMOKE_USER_EMAIL com role 'admin' em user_roles

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL do app (sobrescreve SMOKE_BASE_URL). Ex: https://staging.bimaster.online"
        required: false
        type: string

concurrency:
  group: qa-smoke-submissao-projeto
  cancel-in-progress: false  # nunca cancelar вЂ” pode deixar dados ГіrfГЈos

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install --upgrade pip
          pip install playwright==1.48.0
          python -m playwright install --with-deps chromium

      - name: Run smoke
        env:
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SMOKE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SMOKE_SUPABASE_ANON_KEY }}
          SMOKE_BASE_URL: ${{ inputs.base_url || secrets.SMOKE_BASE_URL }}
        run: python3 scripts/qa/smoke_submissao_projeto.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: /tmp/browser/smoke-submissao-projeto/screenshots/
          retention-days: 7
