# Catálogo canônico de labels do ROQT-BIMASTER.
# Sincronizado automaticamente pelo workflow `.github/workflows/sync-labels.yml`
# usando EndBug/label-sync. Adicionar/alterar label = editar este arquivo.
# Cores em hex sem #. Mantenha a paleta semântica abaixo coerente.

# ---------------------------------------------------------------------------
# Tipo
# ---------------------------------------------------------------------------
- name: "type/feat"
  color: "0E8A16"
  description: "Nova funcionalidade"
- name: "type/fix"
  color: "D73A4A"
  description: "Correção de bug"
- name: "type/chore"
  color: "BFDADC"
  description: "Manutenção, refactor, deps"
- name: "type/docs"
  color: "0075CA"
  description: "Documentação"
- name: "type/security"
  color: "B60205"
  description: "Hardening / vulnerabilidade"
- name: "type/perf"
  color: "FBCA04"
  description: "Performance"
- name: "type/test"
  color: "C5DEF5"
  description: "Testes"

