<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Offline - Trade Marketing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .status {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 20px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 30px;
        }
        
        .status.online {
            background: #d1fae5;
            color: #065f46;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .features {
            margin-top: 30px;
            text-align: left;
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
        }
        
        .features h3 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .features ul {
            list-style: none;
        }
        
        .features li {
            color: #6b7280;
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
        }
        
        .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Você está offline</h1>
        <p>Não foi possível conectar ao servidor. Verifique sua conexão com a internet.</p>
        
        <div id="status" class="status">
            <span class="dot"></span>
            <span>Sem conexão</span>
        </div>
        
        <button onclick="window.location.reload()">Tentar Novamente</button>
        
        <div class="features">
            <h3>Modo Offline Disponível:</h3>
            <ul>
                <li>Visualização de dados em cache</li>
                <li>Fotos salvas localmente</li>
                <li>Sincronização automática ao voltar online</li>
                <li>Dados pendentes salvos no dispositivo</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Verificar conexão periodicamente
        setInterval(() => {
            if (navigator.onLine) {
                const status = document.getElementById('status');
                status.className = 'status online';
                status.innerHTML = '<span class="dot"></span><span>Conexão restaurada!</span>';
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            }
        }, 3000);
    </script>
</body>
</html>
